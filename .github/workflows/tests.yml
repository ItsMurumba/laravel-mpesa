name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-10:
    name: Laravel 10 · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LARAVEL_VERSION: "10.0"
      TESTBENCH_VERSION: "8.0"

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-10-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-10-composer-

      - name: Install dependencies (Laravel 10)
        run: |
          composer require \
            "illuminate/support:^${LARAVEL_VERSION}" \
            "orchestra/testbench:^${TESTBENCH_VERSION}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

  laravel-11:
    name: Laravel 11 · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LARAVEL_VERSION: "11.0"
      TESTBENCH_VERSION: "9.0"

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-11-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-11-composer-

      - name: Install dependencies (Laravel 11)
        run: |
          composer require \
            "illuminate/support:^${LARAVEL_VERSION}" \
            "orchestra/testbench:^${TESTBENCH_VERSION}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

  laravel-12:
    name: Laravel 12 · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LARAVEL_VERSION: "12.0"
      TESTBENCH_VERSION: "10.0"

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-12-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-12-composer-

      - name: Install dependencies (Laravel 12)
        run: |
          composer require \
            "illuminate/support:^${LARAVEL_VERSION}" \
            "orchestra/testbench:^${TESTBENCH_VERSION}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

